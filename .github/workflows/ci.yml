name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # Usamos `npm install` (no `npm ci`) porque deps transitive con peer
      # ranges flexibles resuelven distinto entre Node patch versions / npm
      # versions / arquitecturas. El lock se mantiene como preferencia
      # (acelera install con cache), pero CI puede regenerar deps si hay drift.
      - run: npm install --no-audit --no-fund

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npx eslint .

      - name: Test
        run: npx vitest run
